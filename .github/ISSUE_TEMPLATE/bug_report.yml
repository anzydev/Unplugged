name: 🐞 Bug Report
description: Report a bug to help improve Unplugged
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to report a bug.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: What steps did you take?
      placeholder: |
        1. Open Unplugged app.
        2. Set countdown to 10s.
        3. Disconnect power cord...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: macOS version and device type (e.g. macOS 14.2 Apple Silicon M2, or Intel Mac)
      placeholder: macOS 14.5, Apple Silicon M3
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: Paste any console logs or crash logs if available.
