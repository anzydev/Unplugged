name: ✨ Feature Request
description: Propose a new feature or enhancement for Unplugged
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature_desc
    attributes:
      label: Feature Description
      description: Is your feature request related to a problem or a new idea? Please describe.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Provide a clear description of the feature or logic you want added.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
